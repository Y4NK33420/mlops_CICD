name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_test_deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Python
    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    # Generate model artifacts before testing or building
    - name: Train model 
      run: python train_model.py

    # 4. Run pytest
    - name: Run tests
      run: |
        pytest test_app.py

    # 5. Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 6. Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/iris-ml-api:latest .

    # 7. Push Docker Image
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/iris-ml-api:latest
        
    # 8. Pull and Run Docker Image
    - name: Pull and Run
      run: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/iris-ml-api:latest
        docker run -d -p 8000:8000 --name ml_container ${{ secrets.DOCKER_USERNAME }}/iris-ml-api:latest
        sleep 5
        curl -X POST http://localhost:8000/predict -H "Content-Type: application/json" -d '{"features": [5.1, 3.5, 1.4, 0.2]}'
